services:
  fogospt:
    image: php:8.3-fpm
    container_name: fogospt
    hostname: fogospt
    restart: unless-stopped
    # Run PHP-FPM as the host user so storage/ and bootstrap/cache writes
    # land with sane ownership on the bind-mounted volume. UID/GID are
    # read from the project-level .env (see .env.example). Defaults to
    # 1000:1000 (typical Linux); on macOS export your own (id -u/id -g).
    user: "${UID:-1000}:${GID:-1000}"
    # Expose PHP-FPM directly to the host's nginx, bound to loopback only.
    # Never bind to 0.0.0.0 — PHP-FPM has no auth and exposes RCE by design.
    # The host nginx uses fastcgi_pass 127.0.0.1:9001 to talk to it.
    ports:
      - "127.0.0.1:9001:9000"
    volumes:
      - ./fogospt/:/var/www/html
      # Firebase service account JSON (used for FCM topic subscribe/unsubscribe
      # via OAuth2). Place the file at ./secrets/firebase-sa.json on the host;
      # ./secrets is gitignored. Path inside the container must match
      # FIREBASE_SERVICE_ACCOUNT_PATH in fogospt/.env.
      - ./secrets/firebase-sa.json:/run/secrets/firebase-sa.json:ro
      # OPcache + realpath cache + memory tuning. The base php:8.3-fpm image
      # ships opcache as a shared extension but with conservative defaults that
      # cause noticeable cold-start latency on a Laravel app.
      - ./assets/php/php.ini:/usr/local/etc/php/conf.d/zz-fogospt.ini:ro
      # FPM pool sizing + slowlog. The base image's pm.max_children=5 is too
      # small for a public site — a few stalled upstream calls drain the pool
      # and queue every other request.
      - ./assets/php/www.conf:/usr/local/etc/php-fpm.d/zz-fogospt.conf:ro
    environment:
      - FIREBASE_SERVICE_ACCOUNT_PATH=/run/secrets/firebase-sa.json

  redispt:
    image: redis
    command: redis-server

networks:
  default:
