; Custom PHP/OPcache tuning for the fogospt container.
; Mounted into php:8.3-fpm at /usr/local/etc/php/conf.d/zz-fogospt.ini
; (the `zz-` prefix makes it load last so it wins over distro defaults).

; --- Core ---
memory_limit = 256M
max_execution_time = 60
post_max_size = 12M
upload_max_filesize = 12M
date.timezone = UTC
expose_php = Off

; --- Sessions ---
; PHP's default session.cache_limiter is "nocache" — any code path that calls
; session_start() then forces `Cache-Control: no-store, no-cache, must-revalidate,
; max-age=0` + `Expires: 0` onto the response, which silently overrides the
; SetCacheHeaders middleware we apply per-route. Empty disables the auto-header
; entirely so we control caching from Laravel.
session.cache_limiter = ""

; --- Realpath cache ---
; Laravel touches lots of files per request. The default 16K/120s is too small
; and causes repeated stat() syscalls; bumping it cuts measurable latency.
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; --- OPcache ---
; The official php:8.3-fpm image ships opcache as a shared extension but with
; conservative defaults. These settings keep dev ergonomics (timestamp checks
; stay on) while raising the limits so the whole Laravel codebase actually fits.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.save_comments = 1
opcache.jit_buffer_size = 64M
opcache.jit = tracing
