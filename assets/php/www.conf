; PHP-FPM pool overrides for the fogospt container.
; Mounted into php:8.3-fpm at /usr/local/etc/php-fpm.d/zz-fogospt.conf
; (loaded after the bundled www.conf, so these values win).
;
; The base image ships pm.max_children = 5, which is far too small for a
; public site: if a handful of requests stall on the upstream API, the pool
; drains and every other request — including ones that don't touch the API —
; queues behind the hung workers. We raise the ceiling and keep a few warm.

[www]
pm = dynamic
pm.max_children = 25
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

; Surface stalled workers so we can spot upstream hangs in the logs instead of
; just seeing slow TTFB. Anything taking longer than 10s gets a backtrace.
request_terminate_timeout = 30s
request_slowlog_timeout = 10s
slowlog = /proc/self/fd/2

catch_workers_output = yes
decorate_workers_output = no
